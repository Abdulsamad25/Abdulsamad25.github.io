<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/fontawesome.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Login Page</title>
</head>
<body>
  <div class="container" id="container">
    <div class="form_container signup">
      <form>
        <h1>Create Account</h1>
        <div class="social_icon">
          <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
        </div>
        <span>or use your email for registration</span>
        <input type="text" placeholder="Name" id="username" required>
        <input type="email" placeholder="Email" id="email" required>
        <input type="password" placeholder="password" id="register_password" required>
        <button>Sign Up</button>
      </form>
    </div>
    <div class="form_container signin">
      <form>
        <h1>Sign In</h1>
        <div class="social_icon">
          <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
          <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
        </div>
        <span>or use your email and password</span>
        <input type="email" placeholder="Email" id="email_address" required>
        <input type="password" placeholder="password" id="signin_password" required>
        <a href="#">Forget your password</a>
        <button>Sign In</button>
      </form>
    </div>
    <div class="toggle_container">
      <div class="toggle">
        <div class="toggle_panel toggle_left">
          <h1>Hello Mon-ami</h1>
          <p>Register with Your personal details to access our site features</p>
          <button class="hidden" id="login">Sign In</button>
        </div>
        <div class="toggle_panel toggle_right">
          <h1>Welcome Back!</h1>
          <p>Glad you're back!</p>
          <button class="hidden" id="register">Sign Up</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
  <!-- <script src="script.js"></script> -->
</body>
</html>
